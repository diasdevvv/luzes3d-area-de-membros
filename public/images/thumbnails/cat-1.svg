<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ff7f1a" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#ff7f1a" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff7f1a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9e43" />
      <stop offset="100%" stop-color="#ff7f1a" />
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)" />

  <!-- Outer Glow -->
  <circle cx="300" cy="270" r="180" fill="url(#lampGlow)" filter="url(#blurGlow)" />

  <!-- Grid Pattern overlay -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <path d="M0 100 H600 M0 200 H600 M0 300 H600 M0 400 H600 M0 500 H600" />
    <path d="M100 0 V600 M200 0 V600 M300 0 V600 M400 0 V600 M500 0 V600" />
  </g>

  <!-- 3D Lamp Silhouette Artwork -->
  <g transform="translate(300, 260)">
    <!-- Glowing Core -->
    <circle cx="0" cy="-20" r="45" fill="#ff9e43" opacity="0.8" filter="url(#blurGlow)" />
    
    <!-- Wireframe / Geometric Shading Lamp Base -->
    <path d="M-60 80 L60 80 L40 120 L-40 120 Z" fill="url(#metalGrad)" opacity="0.9" />
    <path d="M-15 -100 L15 -100 L20 80 L-20 80 Z" fill="#27272a" opacity="0.8" />
    
    <!-- Outer Shade Polygon -->
    <path d="M0 -120 L90 -40 L70 60 L-70 60 L-90 -40 Z" fill="none" stroke="url(#metalGrad)" stroke-width="4" opacity="0.9" />
    <path d="M0 -120 L50 -10 L0 60 L-50 -10 Z" fill="none" stroke="#ff9e43" stroke-width="2" opacity="0.5" />
    <path d="M-90 -40 L90 -40 M-70 60 L70 60" stroke="#ff7f1a" stroke-width="2" opacity="0.6" />
    
    <!-- 3D Print Layer Lines indication -->
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#ff9e43" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 4" />
    <line x1="-75" y1="20" x2="75" y2="20" stroke="#ff9e43" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 4" />
  </g>

  <!-- Card Info Footer Banner -->
  <rect x="40" y="460" width="520" height="100" rx="16" fill="#09090b" opacity="0.7" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
  <text x="300" y="502" text-anchor="middle" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="1">
    STL 3D PREMIUM
  </text>
  <text x="300" y="534" text-anchor="middle" fill="#ff9e43" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="0.5">
    Modelo 3D Otimizado
  </text>
</svg>